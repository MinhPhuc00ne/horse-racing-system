services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: horse-racing-db
    restart: always
    environment:
      SA_PASSWORD: "123456"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD",
          "/opt/mssql-tools/bin/sqlcmd",
          "-S",
          "localhost",
          "-U",
          "sa",
          "-P",
          "123456",
          "-Q",
          "SELECT 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: horse-racing-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 1433
      DB_NAME: horseracing
      DB_USER: sa
      DB_PASSWORD: 123456
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: horse-racing-frontend
    restart: always
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  mssql-data:
