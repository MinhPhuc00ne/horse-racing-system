<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raphael Analysis - Sports Racing HUD</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #050a10; color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; display: flex; justify-content: center; align-items: center;
        }

        @property --angle { syntax: '<angle>'; inherits: false; initial-value: 0deg; }

        /* ------------------ UI CƠ BẢN ------------------ */
        .race-track {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #02060a; display: flex; justify-content: center; align-items: center;
            z-index: 1; flex-direction: column;
        }

        .start-btn {
            padding: 15px 40px; font-size: 24px; cursor: pointer; z-index: 10;
            background: linear-gradient(135deg, #00ccff, #0088ff); border: 2px solid #fff;
            border-radius: 5px; color: #fff; font-weight: bold; text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(0, 204, 255, 0.4); transition: transform 0.2s;
        }
        .start-btn:hover { transform: scale(1.05); }

        .horse-running {
            display: none; font-size: 48px; z-index: 10; font-weight: bold; color: #ff8800;
            text-shadow: 0 4px 10px rgba(255,136,0,0.8); animation: bounce 1s infinite alternate ease-in-out;
            text-transform: uppercase; letter-spacing: 2px;
        }
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-20px); } }

        /* ------------------ OVERLAY VÀ CHỮ ------------------ */
        .dark-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 5, 10, 0.95); z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.5s ease;
        }

        .system-text {
            position: absolute; bottom: 5%; left: 50%; transform: translateX(-50%);
            background: rgba(0, 20, 40, 0.9); border: 1px solid rgba(0, 204, 255, 0.5);
            border-left: 8px solid #ff8800; padding: 15px 40px; font-size: 22px; font-weight: bold;
            color: #ffffff; z-index: 120; opacity: 0; transition: opacity 0.2s; text-align: center;
            border-radius: 4px; text-shadow: 0 0 10px #00ccff; min-width: 400px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.8); font-family: 'Courier New', Courier, monospace;
            text-transform: uppercase; letter-spacing: 1px;
        }

        .flash-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 200; opacity: 0; pointer-events: none; }

        /* ------------------ PHASE 1: KHỞI ĐỘNG (NOTICE) ------------------ */
        .notice-container {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 105; display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none;
        }
        .notice-diamond {
            width: 250px; height: 250px; border: 8px solid rgba(0, 204, 255, 0.9);
            transform: rotate(45deg); box-shadow: 0 0 40px rgba(0, 204, 255, 0.6), inset 0 0 40px rgba(0, 204, 255, 0.6);
            display: flex; justify-content: center; align-items: center; background: rgba(0, 30, 60, 0.8);
        }
        .notice-text {
            transform: rotate(-45deg); font-size: 100px; color: #ff8800;
            font-family: 'Arial Black', sans-serif; font-weight: bold; text-shadow: 0 0 20px #ff8800, 0 0 40px #ffcc00;
        }

        @keyframes appearNotice { 
            0% { transform: translate(-50%, -50%) scale(0) rotate(-1080deg); opacity: 0; filter: blur(20px); } 
            15% { transform: translate(-50%, -50%) scale(1.1) rotate(10deg); opacity: 1; filter: blur(0px); } 
            20% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; } 
            85% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; filter: blur(0px); } 
            100% { transform: translate(-50%, -50%) scale(2) rotate(180deg); opacity: 0; filter: blur(10px); } 
        }

        /* ------------------ PHASE 2: SCENE PHÂN TÍCH SPORTS HUD ------------------ */
        .analysis-scene {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 102; pointer-events: none; overflow: hidden;
        }

        /* Lưới Sân cỏ điện tử */
        .grid-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-size: 60px 60px;
            background-image: 
                linear-gradient(to right, rgba(0, 204, 255, 0.1) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0, 204, 255, 0.1) 1px, transparent 1px);
            z-index: 0; transform: perspective(800px) rotateX(70deg) translateY(-100px) translateZ(-200px);
            animation: gridMove 3s linear infinite; opacity: 0.6;
        }
        @keyframes gridMove { from { background-position: 0 0; } to { background-position: 0 60px; } }

        .mc-wrapper {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 170vh; height: 170vh; z-index: 1; opacity: 0; 
            -webkit-mask-image: conic-gradient(black 0deg, black var(--angle), transparent var(--angle), transparent 360deg);
        }
        .mc-wrapper.drawn { -webkit-mask-image: none; opacity: 1; }

        /* Hào quang HUD */
        .blue-glow-bg {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 100%; height: 100%; border-radius: 50%;
            background: radial-gradient(circle at center, rgba(0, 150, 255, 0.1) 0%, rgba(0, 20, 40, 0.5) 40%, transparent 70%);
            z-index: 0; animation: pulseGlow 3s infinite alternate ease-in-out;
        }
        @keyframes pulseGlow { 0% { opacity: 0.6; } 100% { opacity: 1; } }

        .runes-svg {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 100%; height: 100%; z-index: 2;
            filter: drop-shadow(0 0 8px rgba(0, 204, 255, 0.4));
        }
        @keyframes spinSvg { 100% { transform: rotate(360deg); } }
        
        /* ------------------ ĐỒNG HỒ TỐC ĐỘ (SPEEDOMETER) ------------------ */
        @keyframes revUp { 0% { stroke-dashoffset: 2000; } 100% { stroke-dashoffset: 600; } }
        @keyframes blinkWarning { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* ------------------ HOLOGRAM HORSE ------------------ */
        .core-horse {
            position: absolute; top: 50%; left: 50%;
            width: 12vh; height: 12vh; margin-top: -6vh; margin-left: -6vh; z-index: 15;
            animation: spin3D 4s linear infinite; filter: drop-shadow(0 0 10px #ff8800);
        }
        @keyframes spin3D { 0% { transform: perspective(600px) rotateY(0deg); } 100% { transform: perspective(600px) rotateY(360deg); } }

        .fg-horse {
            --horse-color: #00ccff;
            --horse-fill: rgba(0, 204, 255, 0.6);
            position: absolute; top: 50%; left: 25%; transform: translate(-50%, -50%);
            width: 50vh; height: 50vh; z-index: 20; opacity: 0;
            filter: drop-shadow(0 0 20px var(--horse-color));
            transition: opacity 0.5s ease-in;
        }
        
        .horse-name-tag {
            position: absolute; top: -50px; left: 50%; transform: translateX(-50%);
            font-size: 40px; font-weight: bold; color: var(--horse-color);
            text-shadow: 0 0 10px var(--horse-color), 0 0 20px #fff;
            letter-spacing: 5px; opacity: 0; transition: opacity 0.3s;
            font-family: 'Arial Black', sans-serif; text-transform: uppercase;
        }
        .fg-horse.show-horse .horse-name-tag { opacity: 1; animation: slideDown 0.5s forwards; }
        @keyframes slideDown { from { top: -80px; } to { top: -50px; } }

        .custom-horse-svg { width: 100%; height: 100%; overflow: visible; }
        .custom-horse-svg path {
            fill: transparent; stroke: var(--horse-color); stroke-width: 6;
            stroke-dasharray: 4000; stroke-dashoffset: 4000; stroke-linejoin: round;
        }
        .fg-horse.show-horse .custom-horse-svg path { animation: drawHorseLine 1.5s ease-in-out forwards, pulseHorseFill 1.5s 1.5s infinite alternate; }
        .core-horse .custom-horse-svg path { stroke-dashoffset: 0; fill: rgba(255, 136, 0, 0.4); stroke-width: 15; stroke: #ff8800; }

        @keyframes drawHorseLine { 100% { stroke-dashoffset: 0; } }
        @keyframes pulseHorseFill { 0% { fill: transparent; stroke: var(--horse-color); } 100% { fill: var(--horse-fill); stroke: #ffffff; } }

        /* ------------------ THÔNG TIN PHẢI (SPORTS STATS) ------------------ */
        .info-container {
            position: absolute; top: 50%; right: 5%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 20px; z-index: 20;
        }
        .info-panel {
            background: linear-gradient(90deg, rgba(0, 30, 60, 0.95) 0%, rgba(0, 10, 20, 0.8) 100%);
            border: 2px solid #00ccff; border-left: 8px solid #00ccff; border-radius: 4px;
            padding: 20px 30px; color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, sans-serif;
            opacity: 0; box-shadow: 0 5px 25px rgba(0, 204, 255, 0.3); transform: translateX(100px);
            width: 380px;
        }
        .panel-title { font-size: 20px; font-weight: bold; color: #ff8800; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 2px; }
        .panel-data { font-size: 18px; margin: 10px 0; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px dashed rgba(0,204,255,0.3); padding-bottom: 5px; }
        .highlight { color: #00ccff; font-weight: bold; font-size: 22px; text-shadow: 0 0 8px rgba(0,204,255,0.6); font-family: monospace; }
        
        .progress-bar { width: 120px; height: 8px; background: #002244; border-radius: 4px; overflow: hidden; margin-left: 10px; }
        .progress-fill { height: 100%; background: #00ccff; box-shadow: 0 0 10px #00ccff; }

        .panel-3 { border-left: 8px solid #ffaa00; border-color: #ffaa00; box-shadow: 0 5px 25px rgba(255, 170, 0, 0.3); }
        .panel-3 .panel-title { color: #ffffff; }
        .highlight-supreme { color: #ffaa00; font-weight: bold; font-size: 32px; text-shadow: 0 0 15px #ffaa00; font-family: 'Arial Black', sans-serif; }

        @keyframes drawCircle { 0% { --angle: 0deg; opacity: 1; } 100% { --angle: 360deg; opacity: 1; } }
        @keyframes slideInRight { to { opacity: 1; transform: translateX(0); } }
        @keyframes flashAnim { 0% { opacity: 0; } 15% { opacity: 1; } 100% { opacity: 0; } }

    </style>
</head>
<body>

    <div class="race-track">
        <button class="start-btn" id="startBtn">System Start: Run Analytics</button>
        <div class="horse-running" id="horseRunning">🏁 CỔNG MỞ! BẮT ĐẦU ĐUA! 🏁</div>
    </div>

    <div class="dark-overlay" id="darkOverlay"></div>

    <div class="notice-container" id="noticeContainer">
        <div class="notice-diamond">
            <div class="notice-text">AI</div>
        </div>
    </div>

    <!-- MÀN HÌNH PHÂN TÍCH SPORTS HUD -->
    <div class="analysis-scene" id="analysisScene">
        
        <div class="grid-bg"></div>

        <div class="mc-wrapper" id="mcWrapper">
            <div class="blue-glow-bg"></div>

            <!-- Ngựa Core -->
            <div class="core-horse">
                <svg viewBox="0 0 576 512" class="custom-horse-svg">
                    <path d="M575.92 76.6c-.01-8.13-3.02-15.87-8.58-21.8-3.78-4.03-8.58-9.12-13.69-14.5 11.06-6.84 19.5-17.49 22.18-30.66C576.85 4.68 572.96 0 567.9 0H447.92c-70.69 0-128 57.31-128 128H160c-28.84 0-54.4 12.98-72 33.11V160c-48.53 0-88 39.47-88 88v56c0 8.84 7.16 16 16 16h16c8.84 0 16-7.16 16-16v-56c0-13.22 6.87-24.39 16.78-31.68-.21 2.58-.78 5.05-.78 7.68 0 27.64 11.84 52.36 30.54 69.88l-25.72 68.6a63.945 63.945 0 0 0-2.16 37.99l24.85 99.41A15.982 15.982 0 0 0 107.02 512h65.96c10.41 0 18.05-9.78 15.52-19.88l-26.31-105.26 23.84-63.59L320 345.6V496c0 8.84 7.16 16 16 16h64c8.84 0 16-7.16 16-16V318.22c19.74-20.19 32-47.75 32-78.22 0-.22-.07-.42-.08-.64V136.89l16 7.11 18.9 37.7c7.45 14.87 25.05 21.55 40.49 15.37l32.55-13.02a31.997 31.997 0 0 0 20.12-29.74l-.06-77.71zm-64 19.4c-8.84 0-16-7.16-16-16s7.16-16 16-16 16 7.16 16 16-7.16 16-16 16z"/>
                </svg>
            </div>
            
            <!-- SVG SPORTS RACING HUD -->
            <svg class="runes-svg" viewBox="0 0 1000 1000">
                <defs>
                    <path id="circle-out" d="M 500, 500 m -450, 0 a 450,450 0 1,1 900,0 a 450,450 0 1,1 -900,0" />
                    <path id="circle-mid" d="M 500, 500 m -370, 0 a 370,370 0 1,0 740,0 a 370,370 0 1,0 -740,0" />
                </defs>

                <!-- Đồng hồ bấm giờ / Stopwatch Ticks -->
                <circle cx="500" cy="500" r="480" stroke="#00ccff" stroke-width="20" fill="none" stroke-dasharray="4 46.2" opacity="0.6"/>
                <circle cx="500" cy="500" r="480" stroke="#ff8800" stroke-width="30" fill="none" stroke-dasharray="12 239.3" opacity="0.8"/>

                <!-- Đường đua ảo / Track lines -->
                <circle cx="500" cy="500" r="420" stroke="#00ccff" stroke-width="2" fill="none" opacity="0.5"/>
                <circle cx="500" cy="500" r="410" stroke="#00ccff" stroke-width="1" fill="none" stroke-dasharray="10 10" style="animation: spinSvg 20s linear infinite reverse;"/>
                <circle cx="500" cy="500" r="320" stroke="#ffffff" stroke-width="2" fill="none" opacity="0.2"/>
                <circle cx="500" cy="500" r="310" stroke="#ffffff" stroke-width="4" fill="none" stroke-dasharray="30 20" style="animation: spinSvg 15s linear infinite;"/>

                <!-- Speedometer (Đồng hồ tốc độ vòng cung) -->
                <g style="transform-origin: 500px 500px;">
                    <!-- Arc nền -->
                    <path d="M 200 800 A 424 424 0 1 1 800 800" fill="none" stroke="rgba(0, 204, 255, 0.15)" stroke-width="40" stroke-linecap="round"/>
                    <!-- Kim tốc độ nhảy số -->
                    <path d="M 200 800 A 424 424 0 1 1 800 800" fill="none" stroke="#ff8800" stroke-width="40" stroke-linecap="round" stroke-dasharray="2600" stroke-dashoffset="2600" style="animation: revUp 2.5s alternate infinite cubic-bezier(0.4, 0, 0.2, 1);"/>
                </g>

                <!-- Biểu tượng Móng Ngựa (Horseshoe) thay cho Ma thuật -->
                <g style="filter: drop-shadow(0 0 15px #00ccff);">
                    <path d="M 380 350 V 550 A 120 120 0 0 0 620 550 V 350" fill="none" stroke="#00ccff" stroke-width="40" stroke-linecap="round"/>
                    <!-- Lỗ đóng đinh trên móng ngựa -->
                    <circle cx="380" cy="400" r="8" fill="#050a10"/>
                    <circle cx="380" cy="470" r="8" fill="#050a10"/>
                    <circle cx="380" cy="540" r="8" fill="#050a10"/>
                    <circle cx="620" cy="400" r="8" fill="#050a10"/>
                    <circle cx="620" cy="470" r="8" fill="#050a10"/>
                    <circle cx="620" cy="540" r="8" fill="#050a10"/>
                </g>

                <!-- Chữ xoay hiển thị thông số đua ngựa -->
                <text font-size="28" fill="#00ccff" letter-spacing="4" font-family="monospace" style="animation: spinSvg 40s linear infinite; transform-origin: 50% 50%;">
                    <textPath href="#circle-out" startOffset="0%">| SPORTS ANALYTICS ENGINE | RAPHAEL SYSTEM | HORSE BIOMETRICS TRACKING | SPORTS ANALYTICS ENGINE | RAPHAEL SYSTEM | HORSE BIOMETRICS TRACKING </textPath>
                </text>
                
                <text font-size="22" fill="#ff8800" font-weight="bold" letter-spacing="6" font-family="monospace" style="animation: spinSvg 30s linear infinite reverse; transform-origin: 50% 50%;">
                    <textPath href="#circle-mid" startOffset="0%">>>> SPEED CALCULATION >>> STAMINA PREDICTION >>> TURF CONDITION >>> WIND RESISTANCE >>> SPEED CALCULATION >>> STAMINA PREDICTION >>> TURF CONDITION >>> WIND RESISTANCE</textPath>
                </text>
            </svg>
        </div>

        <div class="fg-horse" id="fgHorse">
            <div class="horse-name-tag" id="horseNameTag">VELDORA</div>
            <svg viewBox="0 0 576 512" class="custom-horse-svg">
                <path d="M575.92 76.6c-.01-8.13-3.02-15.87-8.58-21.8-3.78-4.03-8.58-9.12-13.69-14.5 11.06-6.84 19.5-17.49 22.18-30.66C576.85 4.68 572.96 0 567.9 0H447.92c-70.69 0-128 57.31-128 128H160c-28.84 0-54.4 12.98-72 33.11V160c-48.53 0-88 39.47-88 88v56c0 8.84 7.16 16 16 16h16c8.84 0 16-7.16 16-16v-56c0-13.22 6.87-24.39 16.78-31.68-.21 2.58-.78 5.05-.78 7.68 0 27.64 11.84 52.36 30.54 69.88l-25.72 68.6a63.945 63.945 0 0 0-2.16 37.99l24.85 99.41A15.982 15.982 0 0 0 107.02 512h65.96c10.41 0 18.05-9.78 15.52-19.88l-26.31-105.26 23.84-63.59L320 345.6V496c0 8.84 7.16 16 16 16h64c8.84 0 16-7.16 16-16V318.22c19.74-20.19 32-47.75 32-78.22 0-.22-.07-.42-.08-.64V136.89l16 7.11 18.9 37.7c7.45 14.87 25.05 21.55 40.49 15.37l32.55-13.02a31.997 31.997 0 0 0 20.12-29.74l-.06-77.71zm-64 19.4c-8.84 0-16-7.16-16-16s7.16-16 16-16 16 7.16 16 16-7.16 16-16 16z"/>
            </svg>
        </div>

        <div class="info-container">
            <div class="info-panel" id="panel1">
                <div class="panel-title">BIOMETRICS (SINH HỌC)</div>
                <div class="panel-data">
                    <span>Tốc độ (SPD)</span> 
                    <div style="display:flex; align-items:center;">
                        <span class="highlight" id="statSpeed">95</span>
                        <div class="progress-bar"><div class="progress-fill" style="width: 95%;"></div></div>
                    </div>
                </div>
                <div class="panel-data">
                    <span>Thể lực (STA)</span> 
                    <div style="display:flex; align-items:center;">
                        <span class="highlight" id="statStamina">88</span>
                        <div class="progress-bar"><div class="progress-fill" style="width: 88%; background:#ff8800; box-shadow:0 0 10px #ff8800;"></div></div>
                    </div>
                </div>
                <div class="panel-data">
                    <span>Gia tốc (ACC)</span> 
                    <span class="highlight" id="statAccel" style="color: #00ffaa; text-shadow: 0 0 8px #00ffaa;">LIMIT BREAK</span>
                </div>
            </div>

            <div class="info-panel" id="panel2">
                <div class="panel-title">TRACK CONDITIONS</div>
                <div class="panel-data"><span>Loại mặt cỏ:</span> <span class="highlight" id="statCond" style="font-size:18px;">Khô ráo (Good)</span></div>
                <div class="panel-data"><span>Sức gió:</span> <span class="highlight" style="font-size:18px;">2.5 m/s (Đông)</span></div>
            </div>

            <div class="info-panel panel-3" id="panel3">
                <div class="panel-title">SYSTEM PREDICTION</div>
                <div class="panel-data" style="justify-content: center; border-bottom: none; margin-top: 15px;">
                    <span style="font-size:20px; margin-right:15px;">TỈ LỆ THẮNG:</span> 
                    <span class="highlight-supreme" id="statWinRate">99.9%</span>
                </div>
            </div>
        </div>

    </div>

    <div class="flash-screen" id="flashScreen"></div>
    <div class="system-text" id="systemText"></div>

    <script>
        const startBtn = document.getElementById('startBtn');
        const darkOverlay = document.getElementById('darkOverlay');
        const noticeContainer = document.getElementById('noticeContainer');
        const mcWrapper = document.getElementById('mcWrapper');
        const fgHorse = document.getElementById('fgHorse');
        const horseNameTag = document.getElementById('horseNameTag');
        const panel1 = document.getElementById('panel1');
        const panel2 = document.getElementById('panel2');
        const panel3 = document.getElementById('panel3');
        const flashScreen = document.getElementById('flashScreen');
        const systemText = document.getElementById('systemText');
        const horseRunning = document.getElementById('horseRunning');

        const mockHorses = [
            {
                name: "Veldora", color: "#ffaa00", fill: "rgba(255, 170, 0, 0.6)",
                speed: "99", stamina: "95", accel: "MAX",
                condition: "Tương thích Tốt", winRate: "99.99%"
            },
            {
                name: "Velrynd", color: "#ff4400", fill: "rgba(255, 68, 0, 0.6)",
                speed: "92", stamina: "88", accel: "BURST",
                condition: "Tương thích Ổn", winRate: "85.50%"
            },
            {
                name: "Velzado", color: "#00eeff", fill: "rgba(0, 238, 255, 0.6)",
                speed: "96", stamina: "90", accel: "STEADY",
                condition: "Tương thích Rất tốt", winRate: "95.00%"
            },
            {
                name: "Veldanava", color: "#b000ff", fill: "rgba(176, 0, 255, 0.6)",
                speed: "100", stamina: "100", accel: "SUPREME",
                condition: "HOÀN HẢO", winRate: "100.00%"
            }
        ];

        const wait = (ms) => new Promise(resolve => setTimeout(resolve, ms));

        function triggerFlash(duration = 500) {
            flashScreen.style.animation = 'none';
            void flashScreen.offsetWidth; 
            flashScreen.style.animation = `flashAnim ${duration}ms ease-out`;
        }

        function updateSystemText(text) {
            systemText.style.opacity = '0';
            setTimeout(() => {
                systemText.innerText = text;
                systemText.style.opacity = '1';
            }, 150); 
        }

        startBtn.addEventListener('click', async () => {
            startBtn.style.display = 'none';
            horseRunning.style.display = 'none';
            darkOverlay.style.opacity = '1';

            noticeContainer.style.animation = 'appearNotice 2.5s forwards';
            updateSystemText("[ KHỞI ĐỘNG HỆ THỐNG PHÂN TÍCH ]");

            await wait(2500);
            triggerFlash(300); 
            noticeContainer.style.animation = ''; 
            
            updateSystemText("Đang thiết lập Radar sa bàn đường đua...");
            mcWrapper.style.animation = 'drawCircle 1.5s linear forwards';
            
            await wait(1500);
            mcWrapper.classList.add('drawn'); 

            // LẶP QUA 4 CON NGỰA
            for (let i = 0; i < mockHorses.length; i++) {
                const horse = mockHorses[i];
                
                fgHorse.style.setProperty('--horse-color', horse.color);
                fgHorse.style.setProperty('--horse-fill', horse.fill);
                horseNameTag.innerText = horse.name;
                
                document.getElementById('statSpeed').innerText = horse.speed;
                document.getElementById('statStamina').innerText = horse.stamina;
                document.getElementById('statSpeed').nextElementSibling.firstElementChild.style.width = horse.speed + "%";
                document.getElementById('statStamina').nextElementSibling.firstElementChild.style.width = horse.stamina + "%";
                
                document.getElementById('statAccel').innerText = horse.accel;
                document.getElementById('statCond').innerText = horse.condition;
                document.getElementById('statWinRate').innerText = horse.winRate;

                fgHorse.style.opacity = '1';
                fgHorse.classList.add('show-horse');
                updateSystemText(`Bắt đầu đo lường chỉ số sinh học: [${horse.name}]...`);
                
                await wait(1200);
                panel1.style.animation = 'slideInRight 0.4s ease-out forwards';

                await wait(1000);
                updateSystemText(`Tính toán sức cản gió & mặt sân cho [${horse.name}]...`);
                panel2.style.animation = 'slideInRight 0.4s ease-out forwards';

                await wait(1000);
                triggerFlash(200); 
                panel3.style.animation = 'slideInRight 0.4s ease-out forwards';
                updateSystemText(`Hoàn tất dự đoán cho [${horse.name}].`);

                await wait(2500);

                if (i < mockHorses.length - 1) {
                    triggerFlash(200);
                    fgHorse.style.opacity = '0';
                    fgHorse.classList.remove('show-horse');
                    panel1.style.animation = ''; panel1.style.opacity = '0';
                    panel2.style.animation = ''; panel2.style.opacity = '0';
                    panel3.style.animation = ''; panel3.style.opacity = '0';
                    await wait(500); 
                }
            }

            // Kết thúc
            updateSystemText("Xác suất chiến thắng tuyệt đối. Chấp thuận mở cổng đua!");
            await wait(1500);
            triggerFlash(1200); 
            
            darkOverlay.style.opacity = '0';
            systemText.style.opacity = '0';
            
            mcWrapper.style.animation = ''; mcWrapper.classList.remove('drawn'); mcWrapper.style.opacity = '0';
            fgHorse.style.opacity = '0';
            fgHorse.classList.remove('show-horse');
            panel1.style.animation = ''; panel1.style.opacity = '0';
            panel2.style.animation = ''; panel2.style.opacity = '0';
            panel3.style.animation = ''; panel3.style.opacity = '0';
            
            horseRunning.style.display = 'block';

            setTimeout(() => {
                startBtn.style.display = 'block';
                horseRunning.style.display = 'none';
            }, 4000);

        });
    </script>
</body>
</html>
