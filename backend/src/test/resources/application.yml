spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MSSQLServer
    username: sa
    password: 123456
    driver-class-name: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  mail:
    host: ${SPRING_MAIL_HOST:smtp.gmail.com}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:your-email@gmail.com}
    password: ${SPRING_MAIL_PASSWORD:your-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true


server:
  port: 8080

# ===== JWT Configuration =====
app:
  jwt:
    secret: ${JWT_SECRET:test-jwt-secret-key-must-be-long-enough-for-hmac-sha256}
    access-token-expiration: 900000 # 15 minutes (in milliseconds)
    refresh-token-expiration: 604800000 # 7 days (in milliseconds)
  google:
    client-id: ${GOOGLE_CLIENT_ID:test-google-client-id}
    client-secret: ${GOOGLE_CLIENT_SECRET:test-google-client-secret}
  activation-url: ${APP_ACTIVATION_URL:http://localhost:5173/verify-email}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

